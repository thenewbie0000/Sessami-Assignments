<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/media-query(max-350px).css">
</head>
<body>
  <div class="main-container">
    <div class="todo">
      <h1>To-Do List <img src="images/icon.png" alt="To-Do List" title="To-Do List"></h1>
      <div class="row">
        <form>
          <input type="text" placeholder="Add your note" onkeypress="if (event.key === 'Enter') addTask()">
          <button class="add-button">Add</button>
        </form>
      </div>
      <ul id="list-container">
      </ul>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
